<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Apstrādes Portāls</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        
        /* Failu izvēles zona */
        .upload-area {
            display: block;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }
        .upload-area:hover { border-color: var(--primary); }
        .upload-icon { font-size: 40px; margin-bottom: 10px; }
        
        /* Slēptais oriģinālais input */
        #videoInput { display: none; }
        
        /* Pogas */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        /* Statusa un progresa sekcija */
        .status-container {
            display: none;
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            background-color: #f1f5f9;
        }
        .spinner {
            border: 3px solid #cbd5e1;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #statusText { font-weight: 600; font-size: 14px; }
        #fileInfo { font-size: 12px; color: #64748b; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Video Apstrāde</h1>
    <p>Nofilmējiet vai izvēlieties video failu apstrādei ar GPU</p>

    <!-- Piesaistīts 'for="videoInput"', lai Android ierīces dabiski atvērtu failu pārlūku -->
    <label for="videoInput" class="upload-area">
        <div class="upload-icon">🎥</div>
        <div id="uploadLabel">Spiediet, lai uzņemtu vai izvēlētos video</div>
        <div id="uploadLabel">Tiks apstrādātas pirmās 10s</div>
        <div id="fileInfo"></div>
    </label>

    <!-- Bez capture="environment" atribūta Android korekti piedāvās izvēli starp kameru un galeriju -->
    <input type="file" id="videoInput" accept="video/*" maxduration="10" onchange="fileSelected()">

    <button id="submitBtn" onclick="startProcessing()" disabled>Sākt apstrādi</button>

    <!-- Slēptais statusa logs, kas parādās procesa laikā -->
    <div class="status-container" id="statusContainer">
        <div class="spinner" id="statusSpinner"></div>
        <div id="statusText">Gatavojas augšupielādei...</div>
    </div>
</div>

<script>
    // ŠEIT IERAKSTI SAVU DROŠĀ TŪNEĻA ADRESI (Piemēram, ngrok adresi)
    const API_BASE_URL = "https://ngrok-free.app"; 
    
    let selectedFile = null;

function fileSelected() {
    const input = document.getElementById('videoInput');
    if (input.files.length > 0) {
        selectedFile = input.files[0];
        const sizeInMB = (selectedFile.size / (1024 * 1024)).toFixed(2);
        
        // Izveidojam pagaidu video elementu, lai nolasītu tā garumu
        const videoElement = document.createElement('video');
        videoElement.preload = 'metadata';
        videoElement.src = URL.createObjectURL(selectedFile);
        
        videoElement.onloadedmetadata = function() {
            URL.revokeObjectURL(videoElement.src);
            const duration = videoElement.duration;
            
            document.getElementById('uploadLabel').innerText = "Video izvēlēts!";
            
            // Ja video ir garāks par 10 sekundēm, parādām brīdinājumu
            if (duration > 10.5) { // 10.5, lai dotu nelielu pielaidi milisekundēm
                document.getElementById('fileInfo').innerHTML = 
                    `${selectedFile.name} (${sizeInMB} MB)<br>` +
                    `<span style="color: #eab308; font-weight: bold;">⚠️ Uzmanību: Video ir ${duration.toFixed(1)}s garš. Tiks apstrādātas tikai pirmās 10 sekundes!</span>`;
            } else {
                document.getElementById('fileInfo').innerText = `${selectedFile.name} (${sizeInMB} MB) - Garums: ${duration.toFixed(1)}s`;
            }
            
            document.getElementById('submitBtn').disabled = false;
        };
    }
}


    async function startProcessing() {
        if (!selectedFile) return;

        const submitBtn = document.getElementById('submitBtn');
        const statusContainer = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');
        const statusSpinner = document.getElementById('statusSpinner');

        submitBtn.disabled = true;
        statusContainer.style.display = "block";
        statusText.innerText = "Augšupielādē video uz serveri...";

        const formData = new FormData();
        formData.append("file", selectedFile);

        try {
            const response = await fetch(`${API_BASE_URL}/upload`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error("Servera kļūda augšupielādējot.");

            const data = await response.json();
            const taskId = data.task_id;

            statusText.innerText = "Video saņemts. Gaida rindā uz GPU...";
            
            checkStatus(taskId);

        } catch (error) {
            console.error(error);
            statusSpinner.style.display = "none";
            statusText.innerText = "Kļūda: Neizdevās nosūtīt failu.";
            submitBtn.disabled = false;
        }
    }

    function checkStatus(taskId) {
        const statusText = document.getElementById('statusText');
        const statusSpinner = document.getElementById('statusSpinner');

        const interval = setInterval(async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/status/${taskId}`);
                if (!response.ok) return;

                const data = await response.json();

                if (data.status === "PROCESĀ") {
                    // Papildināts: parāda C++ servera sūtītos reāllaika procentus
                    statusText.innerText = `Qt aplikācija apstrādā video: ${data.progress || 0}%...`;
                } 
                else if (data.status === "GATAVS") {
                    clearInterval(interval);
                    statusSpinner.style.display = "none";
                    statusText.innerHTML = `<span style="color: var(--success)">✓ Apstrāde pabeigta!</span><br>Tūlīt sāksies lejupielāde.`;
                    
                    window.location.href = `${API_BASE_URL}/download/${taskId}`;
                    document.getElementById('submitBtn').disabled = false;
                } 
                else if (data.status === "KĻŪDA") {
                    clearInterval(interval);
                    statusSpinner.style.display = "none";
                    statusText.innerText = "Apstrādes laikā radās C++ sistēmas kļūda.";
                    document.getElementById('submitBtn').disabled = false;
                }
            } catch (err) {
                console.error("Kļūda pārbaudot statusu:", err);
            }
        }, 3000);
    }
</script>

</body>
</html>
